<!DOCTYPE html>
<html>
<head>
    <title>Ajouter candidature</title>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .back { background: #6c757d; }
    </style>
</head>
<body>
    <h1>➕ Nouvelle candidature</h1>
    <a href="/" class="back" style="display: inline-block; padding: 12px 24px; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 20px;">← Retour</a>
    
    <form method="POST">
        <div>
            <label>Entreprise *</label>
            <input name="company" required>
        </div>
        
        <div>
            <label>Poste *</label>
            <input name="position" required>
        </div>
        
        <div>
            <label>Statut</label>
            <select name="status">
                <option value="Envoyée">Envoyée</option>
                <option value="En attente">En attente</option>
                <option value="Entretien">Entretien</option>
                <option value="Refusée">Refusée</option>
                <option value="Offre">Offre</option>
            </select>
        </div>
        
        <div>
            <label>CV utilisé</label>
            <input name="cv" placeholder="ex: CV_2026.pdf">
        </div>
        
        <div>
            <label>Lettre de motivation</label>
            <input name="cover" placeholder="ex: LM_EntrepriseX.pdf">
        </div>
        
        <div>
            <label>Réponse reçue</label>
            <textarea name="response" rows="3" placeholder="Le recruteur a répondu..."></textarea>
        </div>
        
        <div>
            <label>Notes</label>
            <textarea name="notes" rows="4" placeholder="Entretien prévu le..., relance dans 7 jours..."></textarea>
        </div>
        
        <button type="submit">💾 Enregistrer</button>
    </form>
</body>
</html>
